apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: longhorn

resources:
  - http-route.yaml

helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    version: 1.11.2
    releaseName: longhorn
    namespace: longhorn
    valuesFile: values.yaml
    includeCRDs: true
# Essential: Cilium App of ArgoCD
# Wave 0, all components relying on networking ready
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  labels:
    app.kubernetes.io/part-of: infrastructure
    app.kubernetes.io/component: networking
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: networking
  source:
    repoURL: https://github.com/jackdbrowne/homelab.git
    targetRevision: main
    path: kubernetes/networking/external-dns
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 1m
        factor: 2
        maxDuration: 5m
  info:
    - name: Description
      value: 'External DNS for Gateway routes'
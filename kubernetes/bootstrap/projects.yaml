apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: controllers
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Cluster services e.g. argo, cert-manager, metrics-service."
  sourceRepos:
    - https://github.com/jackdbrowne/homelab.git
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
---

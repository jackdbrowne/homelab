apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
  annotations:
    argocd.argoproj.io/sync-options: Validate=true
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@brwn.network
    privateKeySecretRef:
      name: letsencrypt
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-acme-api-token
              key: api-token
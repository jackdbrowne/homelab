configs:
  params:
    server.insecure: true
  cm:
    url: https://argocd.brwn.network
    kustomize.buildOptions: "--enable-helm"
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs

crds:
  install: true
  # -- Keep CRDs on chart uninstall
  keep: false

applicationSet:
  metrics:
    enabled: true
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 128Mi

controller:
  metrics:
    enabled: true
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 10m
      memory: 512Mi

dex:
  enabled: false
  metrics:
    enabled: true
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 128Mi

notifications:
  metrics:
    enabled: true
  pdb:
    enabled: true
    maxUnavailable: 1
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 128Mi

redis:
  metrics:
    enabled: true
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 128Mi

redisSecretInit:
  enabled: false

repoServer:
  metrics:
    enabled: true
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 128Mi
  env:
    # Increase the repo server execution timeout to 5 minutes to prevent timeouts during large kustomize builds or Helm chart rendering
    - name: ARGOCD_EXEC_TIMEOUT
      value: 5m

server:
  metrics:
    enabled: true
  pdb:
    enabled: true
    maxUnavailable: 1
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 128Mi
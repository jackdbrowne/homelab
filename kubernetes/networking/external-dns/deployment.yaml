apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns-pihole
  labels:
    app: external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: external-dns
      app.kubernetes.io/instance: external-dns-pihole
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: external-dns-pihole
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.21.0
          args:
            # Gateway API sources
            - --source=gateway-httproute
            - --gateway-name=traefik-gateway-internal
            - --gateway-namespace=traefik
            # Domain filter
            - --domain-filter=brwn.network
            # Pihole settings
            - --provider=pihole
            - --pihole-server=http://192.168.10.10
            - --registry=txt
            - --txt-owner-id=my-cluster
            - --policy=upsert-only

          envFrom:
            - secretRef:
                name: pihole-password

          resources:
            requests:
              memory: "50Mi"
              cpu: "10m"
            limits:
              memory: "100Mi"
              cpu: "50m"
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: traefik

labels:
  - pairs:
      app.kubernetes.io/part-of: infrastructure
      app.kubernetes.io/managed-by: argocd

resources:
  - namespace.yaml
  - gateway-internal.yaml

helmCharts:
  - name: traefik
    repo: https://traefik.github.io/charts
    version: v40.2.0
    releaseName: traefik
    namespace: traefik
    valuesFile: values.yaml
    includeCRDs: true

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-gateway-internal
  labels:
    app: traefik-gateway-internal
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.brwn.network"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-brwn-network-cert
      allowedRoutes:
        namespaces:
          from: All
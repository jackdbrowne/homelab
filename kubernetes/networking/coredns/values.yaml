hpa:
  enabled: true
  maxReplicas: 3
  minReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
podDisruptionBudget:
  maxUnavailable: 1
resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 128Mi
rollingUpdate:
  maxSurge: 1
  maxUnavailable: 0
servers:
  - zones:
      - zone: .
        use_tcp: true
    port: 53
    plugins:
      - name: errors
      - name: health
        configBlock: |-
          lameduck 10s
      - name: ready
      - name: kubernetes
        parameters: cluster.local in-addr.arpa ip6.arpa
        configBlock: |-
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
      - name: prometheus
        parameters: 0.0.0.0:9153
      - name: forward
        parameters: . /etc/resolv.conf
      - name: cache
        parameters: 30
      - name: loop
      - name: reload
      - name: loadbalance
service:
  clusterIP: 172.20.0.10
serviceAccount:
  create: true

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prometheus    

resources:
  - namespace.yaml
  - http-route.yaml

helmCharts:
  - name: grafana
    repo: https://grafana-community.github.io/helm-charts
    version: 12.4.1
    releaseName: grafana
    namespace: grafana
    valuesFile: values.yaml
    includeCRDs: false